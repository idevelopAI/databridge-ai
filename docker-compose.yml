services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-company_data}
      AI_AGENT_DB_PASSWORD: ${AI_AGENT_DB_PASSWORD:?AI_AGENT_DB_PASSWORD is required}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    init: true
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  backend:
    build: .
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-company_data}
      DB_USER: ai_agent_user
      AI_AGENT_DB_PASSWORD: ${AI_AGENT_DB_PASSWORD:?AI_AGENT_DB_PASSWORD is required}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:?GOOGLE_API_KEY is required}
      APP_SECRET_TOKEN: ${APP_SECRET_TOKEN:?APP_SECRET_TOKEN is required}
      GOOGLE_MODEL: ${GOOGLE_MODEL:-gemini-2.5-flash}
      AGENT_VERBOSE: ${AGENT_VERBOSE:-false}
      AGENT_RECURSION_LIMIT: ${AGENT_RECURSION_LIMIT:-16}
      MAX_RESULT_ROWS: ${MAX_RESULT_ROWS:-100}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-12}
      QUERY_PLAN_GUARD_ENABLED: ${QUERY_PLAN_GUARD_ENABLED:-true}
      MAX_QUERY_PLAN_COST: ${MAX_QUERY_PLAN_COST:-10000}
      MAX_QUERY_PLAN_ROWS: ${MAX_QUERY_PLAN_ROWS:-10000}
      MAX_SEQUENTIAL_SCAN_ROWS: ${MAX_SEQUENTIAL_SCAN_ROWS:-50000}
      MAX_CARTESIAN_JOIN_ROWS: ${MAX_CARTESIAN_JOIN_ROWS:-10000}
      SEMANTIC_LAYER_PATH: ${SEMANTIC_LAYER_PATH:-/app/semantic_layer.json}
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 5
    init: true
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      BACKEND_URL: http://backend:8000/api/v1/query
      APP_SECRET_TOKEN: ${APP_SECRET_TOKEN:?APP_SECRET_TOKEN is required}
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-8501}:8501"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 5
    init: true
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    profiles:
      - admin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@local.invalid}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:?PGADMIN_DEFAULT_PASSWORD is required}
    ports:
      - "127.0.0.1:${PGADMIN_PORT:-5050}:80"
    depends_on:
      postgres:
        condition: service_healthy
    init: true
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

volumes:
  postgres_data:
